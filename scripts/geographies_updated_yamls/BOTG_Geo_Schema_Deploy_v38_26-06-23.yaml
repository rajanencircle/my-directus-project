# ==========================================================================
# BOTG ContentHub - Geo collections schema deploy (Staging)
# Generated 26-06-23 from DEV brief v38 (sheet 'Geografies').  REV: status is now 3-state.
# Target: Directus 11.17.4 - apply via `directus schema apply`.
# ==========================================================================
# CONTAINS (full desired field state of the 7 geo collections):
#   - section_* layout groups (group-detail, collapse open/closed)
#   - new fields: status (active/review/archived), media_code, media_code_legacy_botg/_karawane, is_non_geographic
#   - status now on 6 levels: countries, destinations, states, regions, places, locations_tour32
#     (destinations_cluster has NO status - it is a pure grouping)
#   - status values: active (green #2ECDA7) / review (ORANGE #F2994A) / archived (grey #A2B5CD)
#     review = legacy entry needing triage (wrong level, e.g. a state in a country field, or ambiguous spelling)
#   - existing fields: group + DE/EN/NL labels + notes; ISO fields read-only
#   - editable name lives in <collection>_translations.name (labels set there)
#
# !!! INTENTIONAL DELETIONS (defined in v38 via strikethrough) - dropped on apply:
#     - destinations.short_code
#     - destinations_cluster.short_code
#     - destinations_cluster.ISO_alpha_3_code
#
# APPLY (detail + manual fallback in the English guide):
#   1) npx directus schema snapshot ./staging-current.yaml
#   2) For the 7 geo PARENT collections, REPLACE their `fields:` entries with the full sets here.
#   3) For the *_translations collections, UPDATE only the `name` field meta.
#   4) npx directus schema apply --dry-run ./staging-current.yaml   (verify adds/mods + the 3 deletions only)
#   5) npx directus schema apply ./staging-current.yaml
#   2-space list indentation; folders Global_Data > Geographies already exist (no folder defs needed).
# ==========================================================================
